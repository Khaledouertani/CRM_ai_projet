services:
  postgres:
    image: postgres:16
    container_name: crm-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-pfe_crm_ia}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pfe_crm_ia}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm-network

  backend:
    build:
      context: ./BackendDotNet
    container_name: crm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME:-pfe_crm_ia};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-CrmApi}
      Jwt__Audience: ${JWT_AUDIENCE:-CrmApp}
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - crm-network

  frontend:
    build:
      context: ./frontend
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
      # Décommentez pour activer HTTPS (après avoir généré les certificats SSL)
      # - "443:443"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - crm-network

  # Monitoring (Uptime Kuma)
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: crm-uptime
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-data:/app/data
    networks:
      - crm-network
    profiles:
      - monitoring

networks:
  crm-network:
    driver: bridge

volumes:
  pgdata:
  uptime-data:
