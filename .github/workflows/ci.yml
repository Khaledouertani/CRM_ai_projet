name: CI Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore BackendDotNet
        run: dotnet restore BackendDotNet/CrmApi.sln

      - name: Build main project
        run: dotnet build BackendDotNet/src/CrmApi/CrmApi.csproj --configuration Release --no-restore

      - name: Build test project
        run: dotnet build BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Run Integration Tests
        run: dotnet test BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~Integration" --verbosity normal

      - name: Run Security Tests
        run: dotnet test BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~Security" --verbosity normal

      - name: Run Database Tests
        run: dotnet test BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~Database" --verbosity normal

      - name: Run Service Tests
        run: dotnet test BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~Services" --verbosity normal

      - name: Collect Code Coverage
        run: dotnet test BackendDotNet/tests/CrmApi.Tests/CrmApi.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --settings BackendDotNet/coverlet.runsettings

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: BackendDotNet/tests/CrmApi.Tests/TestResults/**/coverage.cobertura.xml

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript version
        run: npx tsc --version

      - name: Lint check
        run: npx tsc --noEmit 2>&1

      - name: Build
        run: npm run build

      - name: Run Unit Tests
        run: npx vitest run --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pfe_crm_ia
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Restore & build backend
        working-directory: ./BackendDotNet
        run: |
          dotnet restore CrmApi.sln
          dotnet build src/CrmApi/CrmApi.csproj --configuration Release --no-restore

      - name: Start backend
        working-directory: ./BackendDotNet/src/CrmApi
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=pfe_crm_ia;Username=postgres;Password=postgres"
          ASPNETCORE_URLS: "http://0.0.0.0:5190"
        run: |
          nohup dotnet run --configuration Release --no-build --project CrmApi.csproj > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
          for i in $(seq 1 30); do
            if curl -s http://localhost:5190/api/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          if ! curl -s http://localhost:5190/api/health > /dev/null 2>&1; then
            echo "Backend failed to start. Logs:"
            cat /tmp/backend.log
            exit 1
          fi

      - name: Start frontend
        working-directory: ./frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          echo "Frontend PID: $!"
          for i in $(seq 1 15); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            echo "Waiting for frontend... ($i/15)"
            sleep 2
          done

      - name: Run Playwright tests
        continue-on-error: true
        working-directory: ./frontend
        run: |
          if [ -d "e2e" ] && [ "$(ls -A e2e/ 2>/dev/null)" ]; then
            npx playwright test --reporter=list,json 2>&1 || true
          else
            echo "No e2e tests found. Skipping."
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run .NET Security Scanner
        continue-on-error: true
        run: |
          dotnet tool install --global security-scan 2>/dev/null || true
          dotnet security-scan BackendDotNet/src/CrmApi/CrmApi.csproj 2>/dev/null || security-scan BackendDotNet/src/CrmApi/CrmApi.csproj 2>/dev/null || echo "Security scan tool not available for this runtime"

      - name: Run npm audit
        continue-on-error: true
        run: |
          cd frontend
          npm audit --audit-level=high

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Check NuGet vulnerabilities
        run: dotnet list BackendDotNet/src/CrmApi/CrmApi.csproj package --vulnerable

      - name: Check npm vulnerabilities
        continue-on-error: true
        run: |
          cd frontend
          npm audit
